<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artículos y Devocionales — Emmanuel™</title>
  <meta name="description" content="Devocionales y artículos de Emmanuel — reflexiones sobre esperanza, fe y comunidad." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="ambient-light" aria-hidden="true"></div>

  <header class="navbar is-scrolled">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__brand">
        <span class="logo-badge"><img src="img/logo-emmanuel.png" alt="" onerror="handleLogoError(this)" /></span>
        <span>Emmanuel</span>
      </a>
      <nav class="navbar__links" aria-label="Navegación">
        <a href="index.html">Inicio</a>
        <a href="articulos.html">Artículos</a>
        <a href="index.html#oracion">Oración</a>
        <a href="index.html#eventos">Eventos</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="blog-hero">
      <div class="container">
        <p class="eyebrow" style="justify-content:center">Para reflexionar</p>
        <h1>Artículos y Devocionales</h1>
        <p>Reflexiones cortas y honestas sobre esperanza, duda, fe y comunidad.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="blog-grid" id="blog-grid">
          <p class="blog-empty">Cargando artículos…</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__bottom">
      <p>© 2026 Emmanuel™. Todos los derechos reservados.</p>
      <p>Desarrollado por RGS Labs™</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    function handleLogoError(img) {
      const badge = img.closest(".logo-badge");
      if (badge) badge.classList.add("is-fallback");
    }

    function formatDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    }

    async function loadBlog() {
      const grid = document.getElementById("blog-grid");
      const { data, error } = await supabaseClient
        .from("articles")
        .select("*")
        .eq("status", "published")
        .order("published_at", { ascending: false });

      if (error || !data || data.length === 0) {
        grid.innerHTML = `<p class="blog-empty">Todavía no hay artículos publicados — vuelve pronto.</p>`;
        return;
      }

      grid.innerHTML = data.map((a) => `
        <article class="devo-card glass-panel">
          <div class="devo-card__media">
            ${a.cover_image_url ? `<img src="${a.cover_image_url}" alt="" loading="lazy" />` : ""}
          </div>
          <div class="devo-card__body">
            <p class="devo-card__category">${a.category || "Devocional"}</p>
            <h3 class="devo-card__title">${a.title}</h3>
            <p class="devo-card__excerpt">${a.excerpt || ""}</p>
            <a href="articulo.html?slug=${encodeURIComponent(a.slug)}" class="btn btn--secondary btn--sm">Leer artículo</a>
          </div>
        </article>
      `).join("");
    }

    loadBlog();
  </script>
</body>
</html>
