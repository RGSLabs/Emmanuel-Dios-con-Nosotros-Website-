<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Emmanuel — Artículos</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="admin-shell">

  <header class="admin-topbar">
    <div class="admin-topbar__inner">
      <div class="admin-topbar__brand">
        <span class="logo-badge"><img src="../img/logo-emmanuel.png" alt="" onerror="handleLogoError(this)" /></span>
        <span>Emmanuel · Panel</span>
      </div>
      <div class="admin-topbar__meta">
        <span id="user-email">—</span>
        <span class="role-badge" id="role-badge">—</span>
        <button class="btn btn--ghost btn--sm" id="logout-btn" style="border-color:rgba(255,255,255,0.3); color:#fff;">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <div class="container">

    <div class="admin-form-panel">
      <h2 class="admin-section-title" id="form-title">Nuevo artículo</h2>
      <form id="article-form">
        <input type="hidden" id="article-id" />
        <div class="admin-form-grid admin-form-grid--2">
          <div class="form-field">
            <label for="field-title">Título</label>
            <input type="text" id="field-title" required placeholder="La luz que no se apaga" />
          </div>
          <div class="form-field">
            <label for="field-category">Categoría</label>
            <input type="text" id="field-category" placeholder="Esperanza, Duda, Comunidad…" />
          </div>
        </div>
        <div class="form-field">
          <label for="field-slug">Slug (URL) — se genera solo, pero puedes ajustarlo</label>
          <input type="text" id="field-slug" required placeholder="la-luz-que-no-se-apaga" />
        </div>
        <div class="form-field">
          <label for="field-cover">URL de imagen de portada (opcional)</label>
          <input type="text" id="field-cover" placeholder="img/devo-01-luz.jpg o una URL externa" />
        </div>
        <div class="form-field">
          <label for="field-excerpt">Extracto (aparece en las tarjetas)</label>
          <input type="text" id="field-excerpt" required placeholder="Una o dos frases que resuman el artículo" />
        </div>
        <div class="form-field">
          <label for="field-content">Contenido (admite Markdown: **negrita**, # Encabezado, etc.)</label>
          <textarea id="field-content" required placeholder="Escribe aquí el devocional completo..."></textarea>
        </div>
        <div class="admin-form-actions">
          <button type="submit" class="btn btn--primary" id="save-draft-btn">Guardar como borrador</button>
          <button type="button" class="btn btn--secondary" id="save-publish-btn">Guardar y publicar</button>
          <button type="button" class="btn btn--ghost" id="cancel-edit-btn" style="display:none;">Cancelar edición</button>
        </div>
      </form>
    </div>

    <h2 class="admin-section-title">Tus artículos</h2>
    <div class="article-list" id="article-list">
      <p class="blog-empty">Cargando…</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    function handleLogoError(img) {
      const badge = img.closest(".logo-badge");
      if (badge) badge.classList.add("is-fallback");
    }

    let currentUser = null;
    let currentRole = null;

    function slugify(text) {
      return text
        .toString()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, "")
        .replace(/\s+/g, "-")
        .replace(/-+/g, "-");
    }

    document.getElementById("field-title").addEventListener("input", (e) => {
      if (!document.getElementById("article-id").value) {
        document.getElementById("field-slug").value = slugify(e.target.value);
      }
    });

    async function guard() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = "login.html"; return; }
      currentUser = session.user;

      const { data: profile } = await supabaseClient.from("profiles").select("role").eq("id", currentUser.id).single();
      if (!profile || (profile.role !== "admin" && profile.role !== "super_admin")) {
        window.location.href = "login.html";
        return;
      }
      currentRole = profile.role;
      document.getElementById("user-email").textContent = currentUser.email;
      document.getElementById("role-badge").textContent = currentRole === "super_admin" ? "Super Admin" : "Admin";
      loadArticles();
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    });

    async function loadArticles() {
      const { data, error } = await supabaseClient
        .from("articles")
        .select("*")
        .order("created_at", { ascending: false });

      const list = document.getElementById("article-list");
      if (error) { list.innerHTML = `<p class="blog-empty">No se pudieron cargar los artículos.</p>`; return; }
      if (!data || data.length === 0) { list.innerHTML = `<p class="blog-empty">Todavía no hay artículos. Crea el primero arriba.</p>`; return; }

      list.innerHTML = data.map((a) => `
        <div class="article-row">
          <div>
            <div class="article-row__title">${a.title}</div>
            <div class="article-row__meta">
              <span class="status-pill ${a.status === "published" ? "status-pill--published" : "status-pill--draft"}">${a.status === "published" ? "Publicado" : "Borrador"}</span>
              · /articulo.html?slug=${a.slug}
            </div>
          </div>
          <div class="article-row__actions">
            <button class="btn btn--secondary btn--sm" onclick="editArticle('${a.id}')">Editar</button>
            <button class="btn btn--ghost btn--sm" onclick="togglePublish('${a.id}', '${a.status}')">${a.status === "published" ? "Pasar a borrador" : "Publicar"}</button>
            ${currentRole === "super_admin" ? `<button class="btn btn--danger btn--sm" onclick="deleteArticle('${a.id}')">Borrar</button>` : ""}
          </div>
        </div>
      `).join("");

      window.__articlesCache = data;
    }

    window.editArticle = function (id) {
      const a = (window.__articlesCache || []).find((x) => x.id === id);
      if (!a) return;
      document.getElementById("article-id").value = a.id;
      document.getElementById("field-title").value = a.title;
      document.getElementById("field-category").value = a.category || "";
      document.getElementById("field-slug").value = a.slug;
      document.getElementById("field-cover").value = a.cover_image_url || "";
      document.getElementById("field-excerpt").value = a.excerpt || "";
      document.getElementById("field-content").value = a.content;
      document.getElementById("form-title").textContent = "Editar artículo";
      document.getElementById("cancel-edit-btn").style.display = "inline-flex";
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    document.getElementById("cancel-edit-btn").addEventListener("click", resetForm);
    function resetForm() {
      document.getElementById("article-form").reset();
      document.getElementById("article-id").value = "";
      document.getElementById("form-title").textContent = "Nuevo artículo";
      document.getElementById("cancel-edit-btn").style.display = "none";
    }

    window.togglePublish = async function (id, currentStatus) {
      const newStatus = currentStatus === "published" ? "draft" : "published";
      const payload = { status: newStatus };
      if (newStatus === "published") payload.published_at = new Date().toISOString();
      const { error } = await supabaseClient.from("articles").update(payload).eq("id", id);
      if (error) { alert("No se pudo actualizar: " + error.message); return; }
      loadArticles();
    };

    window.deleteArticle = async function (id) {
      if (!confirm("¿Seguro que quieres borrar este artículo? No se puede deshacer.")) return;
      const { error } = await supabaseClient.from("articles").delete().eq("id", id);
      if (error) { alert("No se pudo borrar: " + error.message); return; }
      loadArticles();
    };

    async function saveArticle(publish) {
      const id = document.getElementById("article-id").value;
      const payload = {
        title: document.getElementById("field-title").value.trim(),
        slug: slugify(document.getElementById("field-slug").value.trim()),
        category: document.getElementById("field-category").value.trim(),
        cover_image_url: document.getElementById("field-cover").value.trim(),
        excerpt: document.getElementById("field-excerpt").value.trim(),
        content: document.getElementById("field-content").value,
        author_id: currentUser.id
      };
      if (publish) {
        payload.status = "published";
        payload.published_at = new Date().toISOString();
      }

      let error;
      if (id) {
        ({ error } = await supabaseClient.from("articles").update(payload).eq("id", id));
      } else {
        if (!publish) payload.status = "draft";
        ({ error } = await supabaseClient.from("articles").insert(payload));
      }

      if (error) { alert("No se pudo guardar: " + error.message); return; }
      resetForm();
      loadArticles();
    }

    document.getElementById("article-form").addEventListener("submit", (e) => { e.preventDefault(); saveArticle(false); });
    document.getElementById("save-publish-btn").addEventListener("click", () => {
      if (!document.getElementById("article-form").reportValidity()) return;
      saveArticle(true);
    });

    guard();
  </script>
</body>
</html>
