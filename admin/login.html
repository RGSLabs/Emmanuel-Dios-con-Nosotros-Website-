<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Emmanuel — Acceso</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card glass-panel glass-panel--dark">
      <div class="auth-card__brand">
        <span class="logo-badge"><img src="../img/logo-emmanuel.png" alt="" onerror="handleLogoError(this)" /></span>
        <span>Emmanuel</span>
      </div>

      <div id="view-login">
        <h1>Acceso al panel</h1>
        <p class="auth-sub">Solo para el equipo editorial de Emmanuel.</p>

        <div class="form-error" id="login-error"></div>

        <form id="login-form">
          <div class="form-field">
            <label for="login-email">Correo</label>
            <input type="email" id="login-email" required autocomplete="email" placeholder="tucorreo@ejemplo.com" />
          </div>
          <div class="form-field">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••" />
          </div>
          <button type="submit" class="btn btn--on-dark" style="width:100%">Entrar</button>
        </form>

        <p class="auth-sub" style="margin-top:var(--sp-24); margin-bottom:0;">
          ¿Primera vez? <a href="#" id="show-signup" style="color:var(--gold-300); text-decoration:underline;">Crea tu cuenta</a>
        </p>
      </div>

      <div id="view-signup" style="display:none;">
        <h1>Crear cuenta</h1>
        <p class="auth-sub">Úsala solo si tu correo ya fue autorizado por el equipo de Emmanuel.</p>

        <div class="form-error" id="signup-error"></div>

        <form id="signup-form">
          <div class="form-field">
            <label for="signup-email">Correo</label>
            <input type="email" id="signup-email" required autocomplete="email" placeholder="tucorreo@ejemplo.com" />
          </div>
          <div class="form-field">
            <label for="signup-password">Contraseña</label>
            <input type="password" id="signup-password" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres" />
          </div>
          <button type="submit" class="btn btn--on-dark" style="width:100%">Crear cuenta</button>
        </form>

        <p class="auth-sub" style="margin-top:var(--sp-24); margin-bottom:0;">
          <a href="#" id="show-login" style="color:var(--gold-300); text-decoration:underline;">Volver a iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    const loginView = document.getElementById("view-login");
    const signupView = document.getElementById("view-signup");
    document.getElementById("show-signup").addEventListener("click", (e) => { e.preventDefault(); loginView.style.display = "none"; signupView.style.display = "block"; });
    document.getElementById("show-login").addEventListener("click", (e) => { e.preventDefault(); signupView.style.display = "none"; loginView.style.display = "block"; });

    function showError(id, message) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.classList.add("is-visible");
    }
    function hideError(id) {
      document.getElementById(id).classList.remove("is-visible");
    }

    async function redirectIfAuthorized() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) return;
      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .single();
      if (profile && (profile.role === "admin" || profile.role === "super_admin")) {
        window.location.href = "index.html";
      }
    }
    redirectIfAuthorized();

    function readableError(error) {
      if (!error) return "Ocurrió un error inesperado.";
      if (error.message && error.message !== "{}") return error.message;
      if (error.error_description) return error.error_description;
      if (error.msg) return error.msg;
      return "Ocurrió un error inesperado. Abre la consola del navegador (F12 → Console) y revisa el detalle — también aparece en Supabase → Authentication → Logs.";
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError("login-error");
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          console.error("Supabase signIn error:", error);
          showError("login-error", readableError(error));
          return;
        }

        const { data: profile, error: profileError } = await supabaseClient
          .from("profiles")
          .select("role")
          .eq("id", data.user.id)
          .single();

        if (profileError) {
          console.error("Supabase profile lookup error:", profileError);
          showError("login-error", "Tu cuenta existe pero no se pudo leer tu perfil. Es probable que sql/schema.sql no se haya corrido todavía (o falló a medias). Revisa Supabase → Table Editor → ¿existe la tabla 'profiles'?");
          await supabaseClient.auth.signOut();
          return;
        }

        if (!profile || (profile.role !== "admin" && profile.role !== "super_admin")) {
          showError("login-error", "Tu cuenta existe pero no tiene permisos de acceso todavía. Pide al equipo que te autorice.");
          await supabaseClient.auth.signOut();
          return;
        }

        window.location.href = "index.html";
      } catch (e) {
        console.error("Unexpected error during login:", e);
        showError("login-error", "Error de conexión con Supabase. Revisa la consola (F12) para más detalle.");
      }
    });

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError("signup-error");
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;

      try {
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) {
          console.error("Supabase signUp error:", error);
          showError("signup-error", readableError(error));
          return;
        }

        showError("signup-error", "Cuenta creada. Si ya fuiste autorizado, revisa tu correo (si Supabase pide confirmación) y luego inicia sesión.");
      } catch (e) {
        console.error("Unexpected error during signup:", e);
        showError("signup-error", "Error de conexión con Supabase. Revisa la consola (F12) para más detalle.");
      }
    });
  </script>
</body>
</html>
