<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Artículo — Emmanuel™</title>
  <meta name="description" id="page-description" content="Devocional de Emmanuel." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="ambient-light" aria-hidden="true"></div>

  <header class="navbar is-scrolled">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__brand">
        <span class="logo-badge"><img src="img/logo-emmanuel.png" alt="" onerror="handleLogoError(this)" /></span>
        <span>Emmanuel</span>
      </a>
      <nav class="navbar__links" aria-label="Navegación">
        <a href="index.html">Inicio</a>
        <a href="articulos.html">Artículos</a>
        <a href="index.html#oracion">Oración</a>
        <a href="index.html#eventos">Eventos</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <article class="article-view" id="article-view">
        <p class="blog-empty">Cargando…</p>
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__bottom">
      <p>© 2026 Emmanuel™. Todos los derechos reservados.</p>
      <p>Desarrollado por RGS Labs™</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    function handleLogoError(img) {
      const badge = img.closest(".logo-badge");
      if (badge) badge.classList.add("is-fallback");
    }

    function formatDate(iso) {
      if (!iso) return "";
      return new Date(iso).toLocaleDateString("es-MX", { day: "numeric", month: "long", year: "numeric" });
    }

    async function loadArticle() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      const view = document.getElementById("article-view");

      if (!slug) { view.innerHTML = `<p class="blog-empty">Artículo no encontrado.</p>`; return; }

      const { data, error } = await supabaseClient
        .from("articles")
        .select("*")
        .eq("slug", slug)
        .eq("status", "published")
        .single();

      if (error || !data) {
        view.innerHTML = `<p class="blog-empty">Este artículo no existe o todavía no está publicado. <a href="articulos.html">Ver todos los artículos</a></p>`;
        return;
      }

      document.getElementById("page-title").textContent = data.title + " — Emmanuel™";
      document.getElementById("page-description").setAttribute("content", data.excerpt || "");

      view.innerHTML = `
        <p class="article-view__category">${data.category || "Devocional"}</p>
        <h1 class="article-view__title">${data.title}</h1>
        <p class="article-view__meta">${formatDate(data.published_at || data.created_at)}</p>
        ${data.cover_image_url ? `<img class="article-view__cover" src="${data.cover_image_url}" alt="" />` : ""}
        <div class="article-view__body">${window.marked ? marked.parse(data.content) : data.content}</div>
        <p style="margin-top:var(--sp-48);"><a href="articulos.html" class="btn btn--secondary">← Ver todos los artículos</a></p>
      `;
    }

    loadArticle();
  </script>
</body>
</html>
